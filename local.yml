---
- name: Deploy Zerobyte
  hosts: localhost

  tasks:
    - name: Ensure deploy directory exists
      ansible.builtin.file:
        path: "{{ zerobyte_deploy_dir }}"
        state: directory
        mode: "0755"
        owner: lennon
        group: lennon
      become: true

    - name: Template compose.yml
      ansible.builtin.template:
        src: compose.yml.j2
        dest: "{{ zerobyte_deploy_dir }}/compose.yml"
        mode: "0640"
        owner: lennon
        group: lennon
      become: true
      
    - name: Deploy with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ zerobyte_deploy_dir }}"
        state: present
        pull: policy
